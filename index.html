<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solozy Developer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1.2s ease forwards;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    h1 span {
      color: #e94560;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #a8b2d8;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #e94560;
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .description {
      max-width: 480px;
      font-size: 1rem;
      color: #ccd6f6;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.6);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <!-- Particles background -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="avatar">👋</div>
    <h1>Xin chào, tôi là <span>Mạnh</span></h1>
    <p class="subtitle">Web Developer · Designer · Creator</p>
    <div class="divider"></div>
    <p class="description">
      Chào mừng bạn đến trang cá nhân của tôi.<br />
      Nơi tôi chia sẻ các dự án, ý tưởng và những điều tôi đam mê.
    </p>
    <a href="#" class="btn">Khám phá ngay</a>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }
  </script>

</body>
</html>
